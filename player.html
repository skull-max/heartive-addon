<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Web Player</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000000;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        h2 {
            margin-bottom: 15px;
            font-weight: 400;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h2>💀 Skull Player Portal</h2>
    <div class="video-container">
        <iframe id="video-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        // Extract the parameters from the website URL (?id=tt1234&type=movie)
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const iframe = document.getElementById('video-frame');

        // Automatically point to your streaming server layout
        if (imdbId) {
            if (mediaType === 'movie') {
                iframe.src = "https://vidsrc.me" + imdbId;
            } else {
                // For TV Series, Stremio hands over IDs formatted as tt1234:1:1
                const parts = imdbId.split(':');
                const showId = parts[0];
                const season = parts[1] || '1';
                const episode = parts[2] || '1';
                iframe.src = "https://vidsrc.me" + showId + "/" + season + "/" + episode;
            }
        }
    </script>
</body>
</html>
