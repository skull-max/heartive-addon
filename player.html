<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Portal Engine</title>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }
        .top-bar {
            background-color: #0d0e15;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #45f3ff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #45f3ff;
        }
        .stream-window {
            flex-grow: 1;
            position: relative;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Hidden layout block over the screen to intercept first-touch ad triggers */
        .click-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: pointer;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <span class="title">💀 SKULL PORTAL PLAYER</span>
            <span id="shield-status" style="font-size: 12px; color: #45f3ff; font-weight: bold;">Shield Engaged</span>
        </div>
        <div class="stream-window">
            <!-- First-touch click shield block -->
            <div id="portal-shield" class="click-shield"></div>
            <iframe id="app-video-frame" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
        </div>
    </div>

    <script>
        // === CLICK INTERCEPTION SHIELD LOGIC ===
        const shield = document.getElementById('portal-shield');
        const statusText = document.getElementById('shield-status');

        // Prevent standard popups from initializing
        window.open = function() { return null; };

        // Handle the first tap over the media container safely
        shield.addEventListener('click', function(e) {
            e.stopPropagation();
            e.preventDefault();
            
            // Remove the shield container instantly so the player control taps go through
            shield.style.display = 'none';
            statusText.innerText = "Shield Passed - Playing";
            statusText.style.color = "#66fcf1";
        }, true);

        // Standard link construction parser
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const iframe = document.getElementById('app-video-frame');
        const s = String.fromCharCode(47); 

        if (imdbId) {
            if (mediaType === 'movie') {
                iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "movie" + s + imdbId;
            } else {
                const parts = imdbId.split(':');
                const showId = parts.shift();
                const season = parts.shift() || '1';
                const episode = parts.shift() || '1';
                iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "tv" + s + showId + s + season + s + episode;
            }
        }
    </script>
</body>
</html>
