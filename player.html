<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Launcher Portal</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .portal-card {
            background-color: #1f2833;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 85%;
            max-width: 450px;
            border: 1px solid #45f3ff;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 400;
            letter-spacing: 2px;
        }
        p {
            color: #c5a880;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .launcher-btn {
            display: block;
            background-color: #0b0c10;
            color: #45f3ff;
            border: 2px solid #45f3ff;
            padding: 15px;
            margin: 12px 0;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }
        .launcher-btn:hover {
            background-color: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 15px #45f3ff;
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <h2>💀 SKULL PORTAL</h2>
        <p>Select a cloud link matrix to launch your movie stream:</p>
        
        <!-- Interactive Launcher Links -->
        <a id="btn-server1" class="launcher-btn" href="#" target="_blank">🚀 Launch Server 1 (VidSrc)</a>
        <a id="btn-server2" class="launcher-btn" href="#" target="_blank">🛸 Launch Server 2 (SuperEmbed)</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';

        const btn1 = document.getElementById('btn-server1');
        const btn2 = document.getElementById('btn-server2');

        if (imdbId) {
            if (mediaType === 'movie') {
                btn1.href = "https://vidsrc.me" + imdbId;
                btn2.href = "https://multiembed.mov" + imdbId;
            } else {
                const parts = imdbId.split(':');
                const showId = parts[0];
                const season = parts[1] || '1';
                const episode = parts[2] || '1';
                btn1.href = "https://vidsrc.me" + showId + "/" + season + "/" + episode;
                btn2.href = "https://multiembed.mov" + showId + "&s=" + season + "&e=" + episode;
            }
        }
    </script>
</body>
</html>
