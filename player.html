<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Infinite Shield Portal</title>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            position: relative;
        }
        .top-bar {
            background-color: #0d0e15;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
            z-index: 10;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #45f3ff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #45f3ff;
        }
        .stream-window {
            flex-grow: 1;
            position: relative;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Infinite Auto-Resetting Shield Layer */
        .click-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            cursor: pointer;
            background: transparent;
            display: block;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050508;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 4;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #13141f;
            border-top: 5px solid #45f3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.3);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 15px;
            color: #45f3ff;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 5px #45f3ff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <span class="title">💀 SKULL PORTAL PLAYER</span>
            <span id="shield-status" style="font-size: 12px; color: #45f3ff; font-weight: bold;">INFINITE SHIELD ACTIVE</span>
        </div>
        <div class="stream-window">
            <div id="portal-shield" class="click-shield"></div>
            
            <div id="spinner-layer" class="loading-overlay">
                <div class="spinner"></div>
                <div class="loading-text">CACHING LINK MATRIX...</div>
            </div>

            <iframe id="app-video-frame" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('portal-shield');
        const statusText = document.getElementById('shield-status');
        const spinner = document.getElementById('spinner-layer');
        const iframe = document.getElementById('app-video-frame');

        // Block popup windows entirely
        window.open = function() { return null; };

        // CHROME NAVIGATION SECURITY ENHANCEMENT
        // Actively prompts Chrome to block external tab hijack attempts
        window.onbeforeunload = function() {
            return "Skull Shield intercepted a website redirection.";
        };

        // === INFINITE COOLDOWN SHIELD ENGINE ===
        shield.addEventListener('click', function(e) {
            // 1. Instantly catch and destroy the incoming ad breakout thread
            e.stopPropagation();
            e.preventDefault();
            
            statusText.innerText = "POPUP DEFLECTED - WINDOW OPEN";
            statusText.style.color = "#ff4545";

            // 2. Drop the shield for exactly 500 milliseconds (0.5 seconds) so your next tap hits the real button
            shield.style.display = 'none';

            // 3. Automatically turn the shield back on after 0.5 seconds to absorb the next ad wave
            setTimeout(() => {
                shield.style.display = 'block';
                statusText.innerText = "INFINITE SHIELD RE-ENGAGED";
                statusText.style.color = "#45f3ff";
            }, 500);
        }, true);

        iframe.onload = function() {
            spinner.style.opacity = '0';
            setTimeout(() => {
                spinner.style.display = 'none';
            }, 500);
        };

        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const targetServer = urlParams.get('server') || '1';
        const s = String.fromCharCode(47); 

        if (imdbId) {
            if (mediaType === 'movie') {
                if (targetServer === '1') {
                    iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "movie" + s + imdbId;
                } else {
                    iframe.src = "https:" + s + s + "multiembed.mov" + s + "?video_id=" + imdbId;
                }
            } else {
                const parts = imdbId.split(':');
                const showId = parts.shift();
                const season = parts.shift() || '1';
                const episode = parts.shift() || '1';
                
                if (targetServer === '1') {
                    iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "tv" + s + showId + s + season + s + episode;
                } else {
                    iframe.src = "https:" + s + s + "multiembed.mov" + s + "?video_id=" + showId + "&s=" + season + "&e=" + episode;
                }
            }
        }
    </script>
</body>
</html>
