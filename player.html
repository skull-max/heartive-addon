<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Ad-Intercept Player</title>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }
        .top-bar {
            background-color: #0d0e15;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
            box-shadow: 0 4px 15px rgba(69, 243, 255, 0.1);
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #45f3ff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #45f3ff;
        }
        .stream-window {
            flex-grow: 1;
            position: relative;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <span class="title">💀 SKULL AD-SHIELD v2.0</span>
            <span id="ad-counter" style="font-size: 12px; color: #ff4545; font-weight: bold;">Ads Deflected: 0</span>
        </div>
        
        <div class="stream-window">
            <!-- Removed sandbox restriction so VidSrc doesn't throw the "unavailable" block -->
            <iframe id="app-video-frame" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
        </div>
    </div>

    <script>
        // === THE ACTIVE AD SHIELD CORES ===
        let blockedCount = 0;
        function updateAdCounter() {
            blockedCount++;
            document.getElementById('ad-counter').innerText = "Ads Deflected: " + blockedCount;
        }

        // 1. Intercept standard window popups completely
        window.open = function() {
            updateAdCounter();
            return null; // Force-cancels the popup request entirely
        };

        // 2. Freeze the page from being hijacked or redirected away
        window.onbeforeunload = function(e) {
            updateAdCounter();
            e.preventDefault();
            return "Ad redirection blocked";
        };

        // 3. Constantly watch the iframe execution loops for popup commands
        setInterval(() => {
            const frame = document.getElementById('app-video-frame');
            if (frame && frame.contentWindow) {
                try {
                    // Override the popup handlers inside the iframe engine
                    frame.contentWindow.open = function() {
                        updateAdCounter();
                        return null;
                    };
                } catch(e) {
                    // Same-Origin policy catches cross-domain edits, fallback handles it
                }
            }
        }, 500);

        // === STANDARD MOVIE URL CONSTRUCTOR ===
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const iframe = document.getElementById('app-video-frame');
        const s = String.fromCharCode(47); 

        if (imdbId) {
            if (mediaType === 'movie') {
                iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "movie" + s + imdbId;
            } else {
                const parts = imdbId.split(':');
                const showId = parts;
                const season = parts || '1';
                const episode = parts || '1';
                iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "tv" + s + showId + s + season + s + episode;
            }
        }
    </script>
</body>
</html>
