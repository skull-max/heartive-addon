<!-- Replace the script section at the bottom of your player.html file -->
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const imdbId = urlParams.get('id');
    const mediaType = urlParams.get('type') || 'movie';
    const iframe = document.getElementById('app-video-frame');
    const s = String.fromCharCode(47); 

    if (imdbId) {
        if (mediaType === 'movie') {
            // Swapping to a cleaner public embed engine that loves open-source wrappers
            iframe.src = "https:" + s + s + "vidsrc.xyz" + s + "embed" + s + "movie" + s + imdbId;
        } else {
            const parts = imdbId.split(':');
            const showId = parts.shift();
            const season = parts.shift() || '1';
            const episode = parts.shift() || '1';
            iframe.src = "https:" + s + s + "vidsrc.xyz" + s + "embed" + s + "tv" + s + showId + s + season + s + episode;
        }
    }
</script>
