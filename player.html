<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Web Player</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .server-buttons {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .btn {
            background-color: #1f2833;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #66fcf1;
            color: #0b0c10;
        }
        .video-container {
            position: relative;
            width: 95%;
            max-width: 850px;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect */
            background-color: #000000;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2>💀 Skull Player Portal</h2>
    
    <!-- Multi-Server Selector Panel -->
    <div class="server-buttons">
        <button class="btn" onclick="switchServer('vidsrc')">Server 1 (VidSrc)</button>
        <button class="btn" onclick="switchServer('super')">Server 2 (SuperEmbed)</button>
    </div>

    <div class="video-container">
        <!-- added referrerpolicy to bypass tracking protections -->
        <iframe id="video-frame" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const iframe = document.getElementById('video-frame');

        // Global link generation variables
        let server1Url = "";
        let server2Url = "";

        if (imdbId) {
            if (mediaType === 'movie') {
                server1Url = "https://vidsrc.me" + imdbId;
                server2Url = "https://multiembed.mov" + imdbId;
            } else {
                const parts = imdbId.split(':');
                const showId = parts[0];
                const season = parts[1] || '1';
                const episode = parts[2] || '1';
                server1Url = "https://vidsrc.me" + showId + "/" + season + "/" + episode;
                server2Url = "https://multiembed.mov" + showId + "&s=" + season + "&e=" + episode;
            }
            
            // Default to Server 1 on startup
            iframe.src = server1Url;
        }

        // Button control logic
        function switchServer(serverName) {
            if (serverName === 'vidsrc') {
                iframe.src = server1Url;
            } else if (serverName === 'super') {
                iframe.src = server2Url;
            }
        }
    </script>
</body>
</html>
