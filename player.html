<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull Ad-Isolation Player</title>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }
        .top-bar {
            background-color: #0d0e15;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #45f3ff;
            letter-spacing: 2px;
        }
        .stream-window {
            flex-grow: 1;
            position: relative;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Custom Player Application Header UI -->
        <div class="top-bar">
            <span class="title">💀 SKULL AD-BLOCK PLAYER v1.0</span>
            <span style="font-size: 12px; color: #8f94a5;">Stream Isolated Safely</span>
        </div>
        
        <!-- Protected Video Execution Engine -->
        <div class="stream-window">
            <!-- 
              CRUCIAL CODE: The sandbox attribute below allows scripts to run the video,
              but completely revokes their ability to open pop-up windows ('allow-popups' is deleted!)
            -->
            <iframe id="app-video-frame" src="" allowfullscreen referrerpolicy="no-referrer"
                    sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const iframe = document.getElementById('app-video-frame');
        const s = String.fromCharCode(47); 

        if (imdbId) {
            // Points to VidSrc player, but executes inside our sandbox jail block
            if (mediaType === 'movie') {
                iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "movie" + s + imdbId;
            } else {
                const parts = imdbId.split(':');
                const showId = parts[0];
                const season = parts[1] || '1';
                const episode = parts[2] || '1';
                iframe.src = "https:" + s + s + "vidsrc.me" + s + "embed" + s + "tv" + s + showId + s + season + s + episode;
            }
        }
    </script>
</body>
</html>
